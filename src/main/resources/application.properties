spring.application.name=gradeaide-api
server.port=${PORT:8080}

# Neon PostgreSQL — set DATABASE_URL in your environment or .env
# Example: jdbc:postgresql://ep-xxx.ap-southeast-1.aws.neon.tech/neondb?sslmode=require
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/gradeaide}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
